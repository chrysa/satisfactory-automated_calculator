# GitVersion.yml — Semantic versioning configuration
# https://gitversion.net/docs/reference/configuration
#
# Branching strategy:
#   main   → production releases (computed from tags + commits)
#   feat/* → feature branches (pre-release alpha)
#
# Commit message conventions (Conventional Commits):
#   feat:          → minor bump  (3.5.x → 3.6.0)
#   fix: / chore:  → patch bump  (3.5.5 → 3.5.6)
#   feat!: or BREAKING CHANGE in footer → major bump
#
# next-version: fallback used when no git tag exists yet.
# Once a vX.Y.Z tag is present, GitVersion ignores this value.

next-version: '3.5.5'

mode: Mainline

major-version-bump-message: "^(feat|fix|refactor|perf|chore)(\\([^)]+\\))?(!):.+$(?=[\\s\\S]*^BREAKING CHANGE)"
minor-version-bump-message: "^feat(\\([^)]+\\))?!?:.+"
patch-version-bump-message: "^(fix|chore|docs|style|refactor|perf|test|build|ci)(\\([^)]+\\))?:.+"

branches:
  main:
    regex: "^main$"
    mode: ContinuousDeployment
    tag: ""
    increment: Patch
    prevent-increment-of-merged-branch-version: false
    track-merge-target: false
    is-release-branch: true

  feature:
    regex: "^feat(ure)?[/-].+"
    mode: ContinuousDelivery
    tag: alpha
    increment: Minor
    source-branches: ["main"]

  hotfix:
    regex: "^hotfix[/-].+"
    mode: ContinuousDelivery
    tag: beta
    increment: Patch
    source-branches: ["main"]

ignore:
  sha: []

commit-message-incrementing: Enabled
