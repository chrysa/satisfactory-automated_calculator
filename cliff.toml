# cliff.toml — git-cliff changelog configuration
# https://git-cliff.org/docs/configuration
#
# Generates CHANGELOG.md from Conventional Commits.
# Triggered by orhun/git-cliff-action@v4 in .github/workflows/deploy.yml

[changelog]
header = """
# Changelog

All notable changes to S.A.T. are documented here.
Format: [Conventional Commits](https://www.conventionalcommits.org/) | [Keep a Changelog](https://keepachangelog.com/)

"""
body = """
{% if version %}## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## Unreleased{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))
{%- endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs",     group = "Documentation" },
  { message = "^style",    group = "Styling" },
  { message = "^test",     group = "Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore",    group = "Miscellaneous" },
  { message = "^ci",       group = "CI/CD" },
  { message = "^build",    group = "Build" },
  { body = ".*security",   group = "Security" },
]

protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = "v0\\.1\\..*"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
