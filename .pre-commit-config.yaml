default_language_version:
  python: python3.14
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
- hooks:
  - id: check-json
  - id: check-yaml
  - id: end-of-file-fixer
  - id: trailing-whitespace
  - id: check-merge-conflict
  - args:
    - --maxkb=500
    id: check-added-large-files
  repo: https://github.com/pre-commit/pre-commit-hooks
  rev: f1dff44d3a9ae852957f34def96390f28719c232
- hooks:
  - id: console-log-detection
  - id: console-debug-detection
  - id: console-table-detection
  - id: no-console-warn
  - id: env-file-check
  - id: yaml-sorter
  - id: js-syntax-check
    exclude: '\.gs$'
  repo: https://github.com/chrysa/pre-commit-tools
  rev: 4462e85fc30aeec4bddb1728383c504626f1b9d2
- hooks:
  - id: generate-changelog
    stages:
    - manual
  repo: https://github.com/chrysa/pre-commit-hooks-changelog
  rev: 40d13585c4c845c36108a565f00c23f2b946e9d9
