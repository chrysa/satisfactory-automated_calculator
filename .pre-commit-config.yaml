# Configuration pre-commit
# Voir : https://pre-commit.com
# Installation : pip install pre-commit && pre-commit install
# Exécution manuelle : pre-commit run --all-files

repos:
  # ─── Hooks standards ──────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
        name: Vérification syntaxe JSON
      - id: check-yaml
        name: Vérification syntaxe YAML
      - id: end-of-file-fixer
        name: Fin de fichier
      - id: trailing-whitespace
        name: Espaces en fin de ligne
      - id: check-merge-conflict
        name: Marqueurs de conflit git
      - id: check-added-large-files
        name: Fichiers volumineux
        args: [--maxkb=500]

  # ─── chrysa/pre-commit-tools ──────────────────────────────────────────────
  # https://github.com/chrysa/pre-commit-tools
  # Support .gs (Google Apps Script) inclus depuis le commit 18c9b61
  - repo: https://github.com/chrysa/pre-commit-tools
    rev: '18c9b611ebfd6d211a4732baa6834c919c9aa699'
    hooks:
      # Détection console.log/.debug/.table — couvre .js ET .gs
      - id: console-log-detection
        name: Détection console.log (JS/GAS)
      - id: console-debug-detection
        name: Détection console.debug (JS/GAS)
      - id: console-table-detection
        name: Détection console.table (JS/GAS)
      # Vérification des fichiers .env (secrets non commités)
      - id: env-file-check
        name: Vérification .env
      # Tri des clés YAML
      # DÉSACTIVÉ : bug TypeError sur YAML à types mixtes (bool+str)
      # Suivi : https://github.com/chrysa/pre-commit-tools/issues/37
      # - id: yaml-sorter
      #   name: Tri des clés YAML

  # ─── chrysa/pre-commit-hooks-changelog ───────────────────────────────────
  # https://github.com/chrysa/pre-commit-hooks-changelog
  - repo: https://github.com/chrysa/pre-commit-hooks-changelog
    rev: '40d13585c4c845c36108a565f00c23f2b946e9d9'
    hooks:
      - id: generate-changelog
        name: Génération du changelog
        args: [--output-file, CHANGELOG.md]

  # ─── Hooks locaux (définis dans .pre-commit-hooks.yaml) ──────────────────
  - repo: local
    hooks:
      - id: check-gs-syntax
        name: GAS syntax check (.gs)
        # Node.js v24 throws ERR_UNKNOWN_FILE_EXTENSION for .gs files when using
        # `node --check file.gs` (ESM detection rejects unknown extensions).
        # Workaround: pipe each file via stdin with --input-type=commonjs.
        entry: bash -c 'for f in "$@"; do node --input-type=commonjs < "$f" || exit 1; done' --
        language: system
        files: \.gs$
      - id: check-scripts-syntax
        name: Node.js scripts syntax check
        entry: node --check
        language: system
        types: [javascript]
        files: ^scripts/.*\.js$
