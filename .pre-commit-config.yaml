default_language_version:
  python: python3.12
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
- hooks:
  - id: check-json
  - exclude: ^\.github/ISSUE_TEMPLATE/
    id: check-yaml
  - id: end-of-file-fixer
  - args:
    - --markdown-linebreak-ext=md
    id: trailing-whitespace
  - id: check-merge-conflict
  - id: detect-private-key
  - args:
    - --maxkb=500
    id: check-added-large-files
  repo: https://github.com/pre-commit/pre-commit-hooks
  rev: b89c5eef3ba3a74ecd506d968e63a8b80f697abf
- hooks:
  - id: console-log-detection
  - id: console-debug-detection
  - id: console-table-detection
  - id: no-console-warn
  - id: env-file-check
  - exclude: ^(\.github/|docker-compose\.yml)
    id: yaml-sorter
  - exclude: \.gs$
    id: js-syntax-check
  - id: adr-gate
  - id: dockerfile-no-latest
  - id: env-example-sync
  - id: python-print-detection
  - id: python-pprint-detection
  - id: no-bare-except
  - id: python-logger-detection
  - id: no-sync-in-async
  - id: debugger-detection
  - id: regression-gate
    stages:
    - pre-push
  repo: https://github.com/chrysa/pre-commit-tools
  rev: v0.1.1-76
