# pre-commit configuration
# See: https://pre-commit.com
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # ── Standard hooks ─────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: f1dff44d3a9ae852957f34def96390f28719c232
    hooks:
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # ── chrysa/pre-commit-tools ────────────────────────────────────────────────
  # https://github.com/chrysa/pre-commit-tools
  # .gs (Google Apps Script) support added in commit 18c9b61
  - repo: https://github.com/chrysa/pre-commit-tools
    rev: '18c9b611ebfd6d211a4732baa6834c919c9aa699'
    hooks:
      # Detect console.log/.debug/.table — covers both .js and .gs files
      - id: console-log-detection
      - id: console-debug-detection
      - id: console-table-detection
      # Check .env files for committed secrets
      - id: env-file-check
      # yaml-sorter DISABLED: upstream TypeError bug with mixed bool+str YAML keys
      # Tracked: https://github.com/chrysa/pre-commit-tools/issues/37
      - id: yaml-sorter

  # ── Local hooks ────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: check-gs-syntax
        name: GAS syntax check (.gs)
        # Node.js v24 rejects unknown extensions via ESM detection.
        # Workaround: pipe each file through stdin with --input-type=commonjs.
        entry: bash -c 'for f in "$@"; do node --input-type=commonjs < "$f" || exit 1; done' --
        language: system
        files: \.gs$
      - id: check-scripts-syntax
        name: Node.js scripts syntax check
        entry: node --check
        language: system
        types: [javascript]
        files: ^scripts/.*\.js$
