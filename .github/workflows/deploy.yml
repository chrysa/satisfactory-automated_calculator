name: CI / Deploy

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ─── Jobs ───────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Compute version (GitVersion) ─────────────────────────────────────
  version:
    name: "🔢 Compute Version"
    runs-on: ubuntu-latest
    outputs:
      semver:      ${{ steps.gv.outputs.semVer }}
      major_minor: ${{ steps.gv.outputs.major }}.${{ steps.gv.outputs.minor }}
      tag:         v${{ steps.gv.outputs.semVer }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required by GitVersion

      - uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - id: gv
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Print computed version
        run: echo "Version → ${{ steps.gv.outputs.semVer }}"

  # ── 2. Lint & validate ───────────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Validate"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate appsscript.json
        run: |
          python3 -m json.tool src/appsscript.json > /dev/null \
            || (echo '❌ src/appsscript.json is invalid JSON'; exit 1)
          echo '✅ appsscript.json OK'

      - name: Check .gs file count
        run: |
          COUNT=$(find src/ -name "*.gs" | wc -l)
          echo "📂 $COUNT .gs files found"
          [ "$COUNT" -ge 10 ] || (echo '❌ Expected at least 10 .gs files'; exit 1)
          # Verify at least one versioned data file exists in src/data/
          DATA=$(find src/data/ -name "01_data_v*.gs" 2>/dev/null | wc -l)
          echo "  Data files in src/data/: $DATA"
          [ "$DATA" -ge 1 ] || (echo '❌ No versioned data file found in src/data/ (expected 01_data_v*.gs)'; exit 1)
          echo '✅ File counts OK'

      - name: Reject debug/temp files
        run: |
          BAD=$(find src/ \( -name "*_completion.gs" -o -name "AUTOMATION.gs" \
                           -o -name "50_verify_and_fix.gs" -o -name "TEMPLATE*.gs" \) 2>/dev/null)
          [ -z "$BAD" ] || (echo "❌ Debug/template files found in src/: $BAD"; exit 1)
          echo '✅ No debug or template files'

      - name: Check Node.js parse-save syntax
        run: node --check scripts/parse-save.js && echo '✅ parse-save.js syntax OK'

  # ── 3. Deploy to Google Apps Script ─────────────────────────────────────
  deploy:
    name: "🚀 Deploy → GAS"
    runs-on: ubuntu-latest
    needs: [version, lint]
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write credentials
        run: |
          [ -n "${{ secrets.CLASPRC_JSON }}" ]         || (echo '❌ CLASPRC_JSON not set'; exit 1)
          [ -n "${{ secrets.CLASP_SCRIPT_ID }}" ]       || (echo '❌ CLASP_SCRIPT_ID not set'; exit 1)
          printf '%s' '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          python3 -m json.tool ~/.clasprc.json > /dev/null || (echo '❌ CLASPRC_JSON is not valid JSON'; exit 1)
          printf '%s' '{"scriptId":"${{ secrets.CLASP_SCRIPT_ID }}","rootDir":"src"}' > .clasp.json

      - name: Inject version into 00_core_config.gs
        run: |
          VERSION="${{ needs.version.outputs.semver }}"
          sed -i "s|VERSION: '[^']*'|VERSION: '$VERSION'|" src/00_core_config.gs
          echo "✅ VERSION set to $VERSION"

      - name: clasp push
        run: clasp push --force

      - name: Deploy summary
        run: |
          VERSION="${{ needs.version.outputs.semver }}"
          echo "## ✅ Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **SAT version** | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **GAS files** | $(find src/ -name '*.gs' | wc -l) .gs |" >> $GITHUB_STEP_SUMMARY

  # ── 4. Generate changelog (git-cliff) + create GitHub release ───────────
  release:
    name: "📦 Changelog & Release"
    runs-on: ubuntu-latest
    needs: [version, deploy]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(release): update CHANGELOG for v${{ needs.version.outputs.semver }} [skip ci]"
          git push

      - name: Check if release already exists
        id: check
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true"  >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          # Extract this version's section from CHANGELOG.md as release notes
          NOTES=$(awk "/^## \[${TAG#v}\]/,/^## \[/" CHANGELOG.md | head -n -1)
          gh release create "$TAG" \
            --title "SAT $TAG" \
            --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
