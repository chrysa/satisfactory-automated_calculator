name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: "🔍 Lint & Validate"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          python3 -m json.tool src/appsscript.json > /dev/null || (echo '❌ src/appsscript.json invalid'; exit 1)
          echo '✅ JSON OK'

      - name: Check .gs file count
        run: |
          COUNT=$(find src/ -name "*.gs" | wc -l)
          echo "📂 $COUNT fichiers .gs"
          [ "$COUNT" -ge 5 ] || (echo '❌ Pas assez de fichiers .gs'; exit 1)

      - name: Check for debug/test files
        run: |
          BAD=$(find src/ -name "*_completion.gs" -o -name "AUTOMATION.gs" -o -name "50_verify_and_fix.gs" 2>/dev/null)
          [ -z "$BAD" ] || (echo "❌ Fichiers de debug trouvés: $BAD"; exit 1)
          echo '✅ Pas de fichiers de debug'

  deploy:
    name: "🚀 Deploy → GAS"
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Auth + config
        run: |
          if [ -z '${{ secrets.CLASPRC_JSON }}' ]; then
            echo '❌ Secret CLASPRC_JSON is not set'; exit 1
          fi
          printf '%s' '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          python3 -m json.tool ~/.clasprc.json > /dev/null || (echo '❌ CLASPRC_JSON secret is invalid JSON'; exit 1)
          if [ -z '${{ secrets.CLASP_SCRIPT_ID }}' ]; then
            echo '❌ Secret CLASP_SCRIPT_ID is not set'; exit 1
          fi
          printf '%s' '{"scriptId":"${{ secrets.CLASP_SCRIPT_ID }}","rootDir":"src"}' > .clasp.json

      - name: Validate files
        run: |
          python3 -m json.tool src/appsscript.json > /dev/null
          COUNT=$(find src/ -name "*.gs" | wc -l)
          [ "$COUNT" -ge 5 ] || exit 1

      - name: clasp push
        run: clasp push --force

      - name: Summary
        run: |
          VERSION=$(grep -m1 -oP "VERSION: '\K[^']+" src/00_core_config.gs)
          echo "## ✅ Déployé" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version SAT** | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Fichiers** | $(find src/ -name '*.gs' | wc -l) .gs |" >> $GITHUB_STEP_SUMMARY

  release:
    name: "📦 Create Release"
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 -oP "VERSION: '\K[^']+" src/00_core_config.gs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "SAT ${{ steps.version.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
