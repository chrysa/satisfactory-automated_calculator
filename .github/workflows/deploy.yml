true:
  push:
    branches:
    - main
  workflow_dispatch: null
jobs:
  deploy:
    name: Deploy -> GAS
    needs:
    - version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install clasp
      run: npm install -g @google/clasp
      shell: bash
    - name: Write credentials
      run: '[ -n "${{ secrets.CLASPRC_JSON }}" ]   || (echo ''CLASPRC_JSON not set'';
        exit 1)

        [ -n "${{ secrets.CLASP_SCRIPT_ID }}" ] || (echo ''CLASP_SCRIPT_ID not set'';
        exit 1)

        printf ''%s'' ''${{ secrets.CLASPRC_JSON }}'' > ~/.clasprc.json

        python3 -m json.tool ~/.clasprc.json > /dev/null || (echo ''CLASPRC_JSON is
        not valid JSON''; exit 1)

        printf ''%s'' ''{"scriptId":"${{ secrets.CLASP_SCRIPT_ID }}","rootDir":"src"}''
        > .clasp.json

        '
      shell: bash
    - name: Inject version into 00_core_config.gs
      run: 'VERSION="${{ needs.version.outputs.semver }}"

        sed -i -E "s/(^[[:space:]]*VERSION: '')[^'']*/\1$VERSION/" src/00_core_config.gs

        grep "VERSION:" src/00_core_config.gs | head -5

        echo "VERSION set to $VERSION"

        '
      shell: bash
    - name: clasp push
      run: clasp push --force
      shell: bash
    - name: Deploy summary
      run: 'VERSION="${{ needs.version.outputs.semver }}"

        echo "## Deployed" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY

        echo "| | |" >> $GITHUB_STEP_SUMMARY

        echo "|---|---|" >> $GITHUB_STEP_SUMMARY

        echo "| **SAT version** | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY

        echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

        echo "| **GAS files** | $(find src/ -name ''*.gs'' | wc -l) .gs |" >> $GITHUB_STEP_SUMMARY

        '
      shell: bash
    timeout-minutes: 15
  release:
    name: Changelog & Release
    needs:
    - deploy
    - version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - id: tag_check
      name: Check if tag exists
      run: "TAG=\"${{ needs.version.outputs.tag }}\"\nif git rev-parse --quiet --verify\
        \ \"refs/tags/$TAG\" > /dev/null 2>&1; then\n    echo \"exists=true\" >> \"\
        $GITHUB_OUTPUT\"\nelse\n    echo \"exists=false\" >> \"$GITHUB_OUTPUT\"\n\
        fi\n"
      shell: bash
    - env:
        GITHUB_REPO: ${{ github.repository }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OUTPUT: CHANGELOG.md
      if: steps.tag_check.outputs.exists == 'false'
      name: Generate CHANGELOG.md
      uses: orhun/git-cliff-action@v4
      with:
        args: --verbose --tag ${{ needs.version.outputs.tag }}
        config: cliff.toml
    - env:
        GITHUB_REPO: ${{ github.repository }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OUTPUT: release_notes.md
      if: steps.tag_check.outputs.exists == 'false'
      name: Generate release notes
      uses: orhun/git-cliff-action@v4
      with:
        args: --unreleased --tag ${{ needs.version.outputs.tag }} --strip all
        config: cliff.toml
    - if: steps.tag_check.outputs.exists == 'false'
      name: Commit and push CHANGELOG
      run: 'git config user.name "github-actions[bot]"

        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add CHANGELOG.md

        git diff --staged --quiet || git commit -m "chore(release): update CHANGELOG
        for ${{ needs.version.outputs.tag }} [skip ci]"

        git push

        '
      shell: bash
    - if: steps.tag_check.outputs.exists == 'false'
      name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release_notes.md
        make_latest: true
        name: SAT ${{ needs.version.outputs.tag }}
        tag_name: ${{ needs.version.outputs.tag }}
    timeout-minutes: 15
  version:
    name: Compute Version
    outputs:
      semver: ${{ steps.version.outputs.semVer }}
      tag: v${{ steps.version.outputs.semVer }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - id: version
      name: Compute version
      uses: chrysa/github-actions/gitversion@main
    - name: Print computed version
      run: echo "Version -> ${{ steps.version.outputs.semVer }}"
      shell: bash
    timeout-minutes: 10
name: Deploy
permissions:
  checks: write
  contents: write
  pull-requests: write
