name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── 1. Compute version (GitVersion) ──────────────────────────────────────
  version:
    name: "🔢 Compute Version"
    runs-on: ubuntu-latest
    outputs:
      semver:      ${{ steps.gv.outputs.semVer }}
      major_minor: ${{ steps.gv.outputs.major }}.${{ steps.gv.outputs.minor }}
      tag:         v${{ steps.gv.outputs.semVer }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required by GitVersion

      - uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - id: gv
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml

      - name: Print computed version
        run: echo "Version → ${{ steps.gv.outputs.semVer }}"

  # ── 2. Deploy to Google Apps Script ──────────────────────────────────────
  deploy:
    name: "🚀 Deploy → GAS"
    runs-on: ubuntu-latest
    needs: [version]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write credentials
        run: |
          [ -n "${{ secrets.CLASPRC_JSON }}" ]   || (echo '❌ CLASPRC_JSON not set'; exit 1)
          [ -n "${{ secrets.CLASP_SCRIPT_ID }}" ] || (echo '❌ CLASP_SCRIPT_ID not set'; exit 1)
          printf '%s' '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          python3 -m json.tool ~/.clasprc.json > /dev/null || (echo '❌ CLASPRC_JSON is not valid JSON'; exit 1)
          printf '%s' '{"scriptId":"${{ secrets.CLASP_SCRIPT_ID }}","rootDir":"src"}' > .clasp.json

      - name: Inject version into 00_core_config.gs
        run: |
          VERSION="${{ needs.version.outputs.semver }}"
          # Use word-boundary anchor to replace only the SAT app VERSION key,
          # NOT the GAME_VERSION key (which stores the Satisfactory game version).
          sed -i -E "s/(^[[:space:]]*VERSION: ')[^']*/\1$VERSION/" src/00_core_config.gs
          grep "VERSION:" src/00_core_config.gs | head -5
          echo "✅ VERSION set to $VERSION"

      - name: clasp push
        run: clasp push --force

      - name: Deploy summary
        run: |
          VERSION="${{ needs.version.outputs.semver }}"
          echo "## ✅ Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **SAT version** | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **GAS files** | $(find src/ -name '*.gs' | wc -l) .gs |" >> $GITHUB_STEP_SUMMARY

  # ── 3. Generate changelog (git-cliff) + create GitHub release ────────────
  release:
    name: "📦 Changelog & Release"
    runs-on: ubuntu-latest
    needs: [version, deploy]
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(release): update CHANGELOG for v${{ needs.version.outputs.semver }} [skip ci]"
          git push

      - name: Check if release already exists
        id: check
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true"  >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          NOTES=$(awk "/^## \[${TAG#v}\]/,/^## \[/" CHANGELOG.md | head -n -1)
          gh release create "$TAG" \
            --title "SAT $TAG" \
            --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
