"on":
  pull_request:
    paths:
    - .github/actionlint.yaml
    - .github/workflows/**
  push:
    branches:
    - develop
    - main
    - master
    paths:
    - .github/workflows/**
jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      with:
        persist-credentials: false
    - name: Run actionlint
      uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7
      with:
        matcher: true
name: Actionlint
permissions:
  contents: read
