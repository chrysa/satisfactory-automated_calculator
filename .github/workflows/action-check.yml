"on":
  pull_request:
    paths:
    - .github/actionlint.yaml
    - .github/workflows/**
  push:
    branches:
    - develop
    - main
    - master
    paths:
    - .github/workflows/**
jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false
    - name: Run actionlint
      uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8
      with:
        matcher: true
name: Actionlint
permissions:
  contents: read
