name: Lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: "🔍 Lint & Validate"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate appsscript.json
        run: |
          python3 -m json.tool src/appsscript.json > /dev/null \
            || (echo '❌ src/appsscript.json is invalid JSON'; exit 1)
          echo '✅ appsscript.json OK'

      - name: Check .gs file count
        run: |
          COUNT=$(find src/ -name "*.gs" | wc -l)
          echo "📂 $COUNT .gs files found"
          [ "$COUNT" -ge 10 ] || (echo '❌ Expected at least 10 .gs files'; exit 1)
          DATA=$(find src/data/ -name "01_data_v*.gs" 2>/dev/null | wc -l)
          echo "  Data files in src/data/: $DATA"
          [ "$DATA" -ge 1 ] || (echo '❌ No versioned data file found in src/data/ (expected 01_data_v*.gs)'; exit 1)
          echo '✅ File counts OK'

      - name: Reject debug/temp files
        run: |
          BAD=$(find src/ \( -name "*_completion.gs" -o -name "AUTOMATION.gs" \
                           -o -name "50_verify_and_fix.gs" -o -name "TEMPLATE*.gs" \) 2>/dev/null)
          [ -z "$BAD" ] || (echo "❌ Debug/template files found in src/: $BAD"; exit 1)
          echo '✅ No debug or template files'

      - name: Check Node.js parse-save syntax
        run: node --check scripts/parse-save.js && echo '✅ parse-save.js syntax OK'
