<!DOCTYPE html>
<!--
  51_import.html — S.A.T. Save Import Sidebar
  Parses a Satisfactory .sav file directly in the browser (no server upload).
  Uses @etothepii/satisfactory-file-parser loaded from esm.sh CDN.
  On success, calls SAT_importFromSave() server-side to write rows to Production.
-->
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      color: #202124;
      background: #fff;
    }
    h3 { font-size: 15px; margin: 0 0 4px; color: #1a73e8; }
    .hint { color: #5f6368; font-size: 12px; margin: 0 0 12px; }
    input[type=file] { width: 100%; margin-bottom: 8px; cursor: pointer; }
    #status {
      min-height: 18px;
      padding: 4px 0;
      font-size: 12px;
      color: #5f6368;

    #status.err  { color: #d93025; }

      font-size: 11px;
      margin-top: 6px;
    }

      background: #e8f0fe;
      padding: 4px 5px;

      border: 1px solid #c5cae9;
      position: sticky;
      top: 0;

    tr:nth-child(even) td { background: #f8f9fa; }
    .counter { font-weight: 600; color: #1a73e8; }
    .btn {
      display: inline-block;
      padding: 7px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;

<body>

<p class="hint">Analysé dans ton navigateur — aucune donnée envoyée à Google.</p>

<label class="upload-area" id="uploadLabel" for="fileInput">

  <span id="uploadText">Sélectionne un fichier <code>.sav</code></span>

const PURITY_MAP = {
  'EResourcePurity::RP_Inpure': 'Impur',
  'EResourcePurity::RP_Normal': 'Normal',
  'EResourcePurity::RP_Pure':   'Pur',
  'RP_Inpure': 'Impur',

// ─── Helpers ──────────────────────────────────────────────────────────────────

function classKey(path) {
  if (!path) return '';
  return path.split('.').pop();
}
function prop(obj, name) {
  return obj && obj.properties && obj.properties[name];
}
function propVal(obj, name) {
  const p = prop(obj, name);
  return p !== undefined && p !== null ? p.value : undefined;
}

// ─── UI refs ──────────────────────────────────────────────────────────────────

const elStatus  = document.getElementById('status');
const elProg    = document.getElementById('prog');
const elActions = document.getElementById('actions');
const elPreview = document.getElementById('preview');
const elRapport = document.getElementById('rapport');

function setStatus(msg, cls) {
  elStatus.textContent = msg;
  elStatus.className = cls || '';
}
function setProg(v) {
  elProg.style.display = v >= 100 || v <= 0 ? 'none' : 'block';
  elProg.value = v;
}

// ─── State ────────────────────────────────────────────────────────────────────

let parsedRows    = null;
let collectibles  = null;

// ─── File input ───────────────────────────────────────────────────────────────

const elUploadLabel = document.getElementById('uploadLabel');
const elUploadText  = document.getElementById('uploadText');

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  // Update upload zone appearance
  elUploadLabel.classList.add('has-file');
  elUploadText.textContent = file.name;

  elActions.style.display = 'none';
  elPreview.innerHTML = '';
  elRapport.innerHTML = '';
  parsedRows   = null;
  collectibles = null;

  try {
    setStatus('Chargement du parser (@etothepii/satisfactory-file-parser)…');
    setProg(10);

    // Dynamic import from esm.sh CDN — runs in the browser, not on GAS servers
    const { Parser } = await import('https://esm.sh/@etothepii/satisfactory-file-parser@3.3.1');
    setProg(30);

    setStatus('Lecture du fichier…');
    const buffer = await file.arrayBuffer();
    setProg(55);

    setStatus('Analyse de la sauvegarde…');
    const save = Parser.ParseSave(file.name.replace(/\.sav$/i, ''), buffer);
    setProg(80);

    const allObjects = Object.values(save.levels).flatMap(l => l.objects || []);

    parsedRows   = extractProduction(allObjects);
    collectibles = extractCollectibles(allObjects, save);
    setProg(100);

    renderPreview(parsedRows);
    renderRapport(collectibles);
    elActions.style.display = 'block';

    const label = parsedRows.length === 0
      ? '⚠️ Aucun bâtiment de production trouvé dans cette sauvegarde.'
      : `✅ ${parsedRows.length} lignes extraites depuis ${file.name}`;
    setStatus(label, parsedRows.length === 0 ? 'warn' : 'ok');

  } catch (err) {
    setProg(0);
    elUploadLabel.classList.remove('has-file');
    elUploadText.textContent = 'Sélectionne un fichier .sav';
    setStatus('❌ ' + err.message, 'err');
    console.error(err);
  }
});

// ─── Extract production rows ──────────────────────────────────────────────────

function extractProduction(allObjects) {
  const KEYS = new Set(Object.keys(MACHINE_MAP));

  // ── Build priority switch + circuit maps ────────────────────────────────
  // switchTagMap:    switchInstanceBase → mBuildingTag (user-set name)
  // circuitToSwitch: circuitID → switchInstanceBase (only if circuit has exactly 1 switch)
  // instanceToCircuit: machineInstanceBase → circuitID

  const allCircuits = allObjects.filter(o => o?.typePath?.includes('FGPowerCircuit'));

  const switchTagMap = new Map(); // switchInstanceBase → mBuildingTag
  for (const obj of allObjects) {
    if (!obj?.typePath?.includes('PriorityPowerSwitch')) continue;
    const instBase = obj.instanceName?.split('.').pop();
    const tag = obj.properties?.mBuildingTag?.value ?? null;
    if (instBase) switchTagMap.set(instBase, tag);
  }

  const instanceToCircuit = new Map();
  const circuitSwitchCount = new Map();
  for (const circuit of allCircuits) {
    const cid = circuit.properties?.mCircuitID?.value ?? null;
    if (cid === null) continue;
    const components = circuit.properties?.mComponents?.values ?? [];
    for (const comp of components) {
      const pn = comp?.pathName ?? comp?.value?.pathName ?? null;
      if (!pn) continue;
      const dotIdx = pn.lastIndexOf('.');
      if (dotIdx < 0) continue;
      const instBase = pn.slice(0, dotIdx).split('.').pop();
      if (!instBase) continue;
      const classK = instBase.replace(/_\d+$/, '');
      if (classK === 'Build_PriorityPowerSwitch_C') {
        if (!circuitSwitchCount.has(cid)) circuitSwitchCount.set(cid, []);
        circuitSwitchCount.get(cid).push(instBase);
      } else {
        instanceToCircuit.set(instBase, cid);
      }
    }
  }

  const circuitToSwitch = new Map();
  for (const [cid, switchList] of circuitSwitchCount) {
    if (switchList.length === 1) circuitToSwitch.set(cid, switchList[0]);
  }

  // ── Extract data per building ────────────────────────────────────────────
  const buildings = allObjects.filter(o => o && o.typePath && KEYS.has(classKey(o.typePath)));
  const extracted = [];

  for (const b of buildings) {
    const key = classKey(b.typePath);
    const machine = MACHINE_MAP[key] || key;

    const clockRaw = propVal(b, 'mCurrentPotential')
                  ?? propVal(b, 'mPendingPotential')
                  ?? 1;
    const oc = Math.round(Number(clockRaw) * 100);

    // Machines éteintes (switch OFF en jeu) → exclues de l'import
    const isProducing = propVal(b, 'mIsProducing');
    if (isProducing === false) continue;

    const recipeProp = prop(b, 'mCurrentRecipe');
    let recipe = '';
    if (recipeProp && recipeProp.value && recipeProp.value.pathName) {
      const rKey = classKey(recipeProp.value.pathName);
      recipe = RECIPE_MAP[rKey] || rKey;
    }
    // Only include machines with a recipe (verify production)
    if (!recipe) continue;

    const sloop = Number(
      propVal(b, 'mNumSomersloopsSlotted') ?? propVal(b, 'mNumSlotsUsedForced') ?? 0
    );

    let purity = 'Normal';
    const pp = prop(b, 'mNodePurity') ?? prop(b, 'mExtractorTypeName');
    if (pp && pp.value) {
      const pFull = String(pp.value);
      const pKey  = pFull.split('::').pop();
      purity = PURITY_MAP[pFull] ?? PURITY_MAP[pKey] ?? 'Normal';
    }

    const z = (b.transform && b.transform.translation) ? b.transform.translation.z : 0;

    // Étage name from priority switch via circuit membership
    const instanceBase = b.instanceName?.split('.').pop() ?? null;
    const cid = instanceBase ? (instanceToCircuit.get(instanceBase) ?? null) : null;
    const switchInst = cid === null ? null : (circuitToSwitch.get(cid) ?? null);
    const etageName = switchInst ? (switchTagMap.get(switchInst) ?? null) : null;

    extracted.push({ machine, recipe, oc, sloop, purity, z, etageName });
  }

  // ── Group identical machines per ligne de production ─────────────────────
  const groups = {};
  for (const e of extracted) {
    const k = `${e.etageName ?? '_nc'}|${e.machine}|${e.recipe}|${e.oc}|${e.purity}|${e.sloop}`;
    if (!groups[k]) groups[k] = { ...e, nb: 0 };
    groups[k].nb++;
  }

  return Object.values(groups)
    .sort((a, b) => {
      const na = a.etageName ?? '', nb = b.etageName ?? '';
      if (na !== nb) return na.localeCompare(nb, 'fr');
      return a.machine.localeCompare(b.machine, 'fr');
    })
    .map(r => ({
      etage:   r.etageName ?? 'Sans circuit',
      machine: r.machine,
      recipe:  r.recipe,
      nb:      r.nb,
      oc:      r.oc,
      purity:  r.purity,
      sloop:   r.sloop,
    }));
}

// ─── Extract collectibles ─────────────────────────────────────────────────────

function countInWorld(allObjects, substr) {
  return allObjects.filter(o => o && o.typePath && o.typePath.includes(substr)).length;
}

function countInInventories(allObjects, descSubstr) {
  let total = 0;
  for (const obj of allObjects) {
    if (!obj || !obj.properties) continue;
    for (const p of Object.values(obj.properties)) {
      if (!p || !Array.isArray(p.values)) continue;
      for (const stack of p.values) {
        if (!stack || !stack.value) continue;
        const props = stack.value.properties || (stack.value.value && stack.value.value.properties);
        if (!props) continue;
        const itemProp = props.Item;
        const numProp  = props.NumItems;
        const ref = itemProp && itemProp.value && itemProp.value.itemReference;
        if (ref && ref.pathName && ref.pathName.includes(descSubstr)) {
          total += (numProp && typeof numProp.value === 'number') ? numProp.value : 1;
        }
      }
    }
  }
  return total;
}

function extractCollectibles(allObjects, save) {
  const playSeconds  = (save.header && save.header.playDurationSeconds) || 0;
  const hours        = Math.floor(playSeconds / 3600);
  const minutes      = Math.floor((playSeconds % 3600) / 60);

  // Hard drives — 3 types of crash site debris
  const crashRemain  = countInWorld(allObjects, 'BP_CrashSiteDebris')
                     + countInWorld(allObjects, 'BP_DebrisActor_02')
                     + countInWorld(allObjects, 'BP_DebrisActor_03');
  const hdCollected  = countInInventories(allObjects, 'Desc_HardDrive');
  const hdTotal      = crashRemain + hdCollected;
  const hdPct        = hdTotal > 0 ? Math.round((hdCollected / hdTotal) * 100) : 0;

  // Somersloops — BP_WAT1 in world, Desc_WAT1 in inventory
  const sloopsSlotted = parsedRows ? parsedRows.reduce((s, r) => s + (r.sloop || 0), 0) : 0;
  const sloopsWorld   = countInWorld(allObjects, 'BP_WAT1');
  const sloopsInv     = countInInventories(allObjects, 'Desc_WAT1');

  // Mercer Spheres — BP_WAT2 in world, Desc_WAT2 in inventory
  const spheresWorld  = countInWorld(allObjects, 'BP_WAT2');
  const spheresInv    = countInInventories(allObjects, 'Desc_WAT2');

  // Power Slugs — raw slugs + already-processed shards (Desc_CrystalShard)
  const slugGW  = countInWorld(allObjects, 'BP_Crystal.BP_Crystal_C');
  const slugYW  = countInWorld(allObjects, 'BP_Crystal_mk2');
  const slugBW  = countInWorld(allObjects, 'BP_Crystal_mk3');
  const slugGI  = countInInventories(allObjects, 'Desc_Crystal.Desc_Crystal_C');
  const slugYI  = countInInventories(allObjects, 'Desc_Crystal_mk2');
  const slugBI  = countInInventories(allObjects, 'Desc_Crystal_mk3');
  const shardsReady = countInInventories(allObjects, 'Desc_CrystalShard');
  const shards  = shardsReady + slugGI * 1 + slugYI * 2 + slugBI * 5;

  return {
    playtime: `${hours}h ${String(minutes).padStart(2,'0')}min`,
    hd: { collected: hdCollected, total: hdTotal, pct: hdPct, sites: crashRemain },
    sloops: { slotted: sloopsSlotted, inv: sloopsInv, world: sloopsWorld },
    spheres: { inv: spheresInv, world: spheresWorld },
    slugs: { gW: slugGW, gI: slugGI, yW: slugYW, yI: slugYI, bW: slugBW, bI: slugBI, shardsReady, shards },
  };
}

// ─── Render helpers ───────────────────────────────────────────────────────────

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderPreview(rows) {
  if (rows.length === 0) {
    elPreview.innerHTML = '<p style="color:#e37400">⚠️ Aucun bâtiment de production détecté.</p>';
    return;
  }
  const headers = ['Étage','Machine','Recette','Nb','OC%','Pureté','Sloop'];
  const keys    = ['etage','machine','recipe','nb','oc','purity','sloop'];
  let html = `<p><span class="counter">${rows.length}</span> lignes de production :</p>`;
  html += '<table><thead><tr>' + headers.map(h => `<th>${esc(h)}</th>`).join('') + '</tr></thead><tbody>';
  for (const r of rows) {
    html += '<tr>' + keys.map(k => `<td>${esc(r[k] ?? '')}</td>`).join('') + '</tr>';
  }
  html += '</tbody></table>';
  elPreview.innerHTML = html;
}

function renderRapport(c) {
  if (!c) return;

  // ── Percentages ──────────────────────────────────────────────────────────
  const sloopsCollected = c.sloops.slotted + c.sloops.inv;
  const sloopsTotal     = sloopsCollected + c.sloops.world;
  const sloopsPct       = sloopsTotal > 0 ? Math.round(sloopsCollected / sloopsTotal * 100) : 0;

  const spheresTotal = c.spheres.inv + c.spheres.world;
  const spheresPct   = spheresTotal > 0 ? Math.round(c.spheres.inv / spheresTotal * 100) : 0;

  // Shards: current (already collected / converted) vs max (if all world slugs picked)
  const slugRemainingPotential = c.slugs.gW * 1 + c.slugs.yW * 2 + c.slugs.bW * 5;
  const slugMaxShards          = c.slugs.shards + slugRemainingPotential;
  const slugPct                = slugMaxShards > 0 ? Math.round(c.slugs.shards / slugMaxShards * 100) : 0;

  // ── Helpers ───────────────────────────────────────────────────────────────
  function pctBadge(pct) {
    const cls = pct >= 75 ? 'pct-high' : pct >= 40 ? 'pct-med' : 'pct-low';
    return `<span class="pct-badge ${cls}">${pct}%</span>`;
  }
  function progressBar(pct) {
    const color = pct >= 75 ? '#34a853' : pct >= 40 ? '#fbbc04' : '#ea4335';
    return `<div class="collect-bar"><div class="collect-fill" style="width:${pct}%;background:${color}"></div></div>`;
  }
  function collectCard(icon, name, pct, detail, sub) {
    return `<div class="collect-card">
      <div class="collect-head">
        <span class="collect-name">${icon} ${name}</span>
        ${pctBadge(pct)}
      </div>
      <div class="collect-detail">${detail}</div>
      ${progressBar(pct)}
      ${sub ? `<div class="collect-sub">${sub}</div>` : ''}
    </div>`;
  }

  // ── Hard drives ───────────────────────────────────────────────────────────
  const hdCard = collectCard(
    '💾', 'Disques durs',
    c.hd.pct,
    `<b>${c.hd.collected}</b> / ${c.hd.total} collectés`,
    c.hd.sites > 0 ? `${c.hd.sites} site(s) encore disponible(s)` : '✅ Tous les sites fouillés'
  );

  // ── Somersloops ───────────────────────────────────────────────────────────
  const sloopSub = [];
  if (c.sloops.slotted > 0) sloopSub.push(`${c.sloops.slotted} slottés dans des machines`);
  if (c.sloops.inv > 0)     sloopSub.push(`${c.sloops.inv} en stock`);
  if (c.sloops.world > 0)   sloopSub.push(`${c.sloops.world} encore dans le monde`);
  const sloopCard = collectCard(
    '🔮', 'Somersloops',
    sloopsPct,
    `<b>${sloopsCollected}</b> / ${sloopsTotal} collectés`,
    sloopSub.join(' · ')
  );

  // ── Mercer Spheres ────────────────────────────────────────────────────────
  const sphereSub = c.spheres.world > 0
    ? `${c.spheres.world} encore dans le monde`
    : '✅ Toutes collectées';
  const sphereCard = collectCard(
    '🌀', 'Sphères de Mercer',
    spheresPct,
    `<b>${c.spheres.inv}</b> / ${spheresTotal} collectées`,
    sphereSub
  );

  // ── Energy Slugs ──────────────────────────────────────────────────────────
  const rawInHand = c.slugs.gI + c.slugs.yI + c.slugs.bI;
  const slugDetailLine = rawInHand > 0
    ? `<b>${c.slugs.shards}</b> shards · ${rawInHand} limace(s) brute(s) en inventaire`
    : `<b>${c.slugs.shards}</b> shards · +${slugRemainingPotential} potentiels restants`;
  const slugBarColor = slugPct >= 75 ? '#34a853' : slugPct >= 40 ? '#fbbc04' : '#ea4335';
  const slugPctCls   = slugPct >= 75 ? 'pct-high' : slugPct >= 40 ? 'pct-med' : 'pct-low';
  const slugCard = `<div class="collect-card">
    <div class="collect-head">
      <span class="collect-name">⚡ Limaces d'énergie</span>
      <span class="pct-badge ${slugPctCls}">${slugPct}%</span>
    </div>
    <div class="collect-detail">${slugDetailLine}</div>
    <div class="collect-bar"><div class="collect-fill" style="width:${slugPct}%;background:${slugBarColor}"></div></div>
    <div class="slug-tiers">
      <div class="slug-tier">🟢 <b>${esc(String(c.slugs.gW))}</b><span class="slug-world">dans le monde</span></div>
      <div class="slug-tier">🟡 <b>${esc(String(c.slugs.yW))}</b><span class="slug-world">dans le monde</span></div>
      <div class="slug-tier">🔵 <b>${esc(String(c.slugs.bW))}</b><span class="slug-world">dans le monde</span></div>
    </div>
  </div>`;

  // ── Render ────────────────────────────────────────────────────────────────
  elRapport.innerHTML = `
    <div class="rpt-block">
      <div class="rpt-title">📊 Rapport de sauvegarde</div>
      <div class="rpt-row">
        <span class="rpt-label">⏱ Temps de jeu</span>
        <span class="rpt-value">${esc(c.playtime)}</span>
      </div>
    </div>
    ${hdCard}
    ${sloopCard}
    ${sphereCard}
    ${slugCard}
  `;
}

// ─── Import (server call) ─────────────────────────────────────────────────────

window.doImport = function(append) {
  if (!parsedRows || parsedRows.length === 0) {
    setStatus('⚠️ Aucune ligne à importer.', 'warn');
    return;
  }
  const label = append ? 'Ajout' : 'Remplacement';
  document.getElementById('btnAppend').disabled  = true;
  document.getElementById('btnReplace').disabled = true;
  setStatus(`${label} en cours…`);

  google.script.run
    .withSuccessHandler(function(res) {
      document.getElementById('btnAppend').disabled  = false;
      document.getElementById('btnReplace').disabled = false;
      if (res && res.error) {
        setStatus('❌ ' + res.error, 'err');
      } else {
        setStatus(`✅ ${res.count} ligne(s) importée(s). Ouverture de l'assistant…`, 'ok');
        elActions.style.display = 'none';
        // Ouvrir l'assistant après import réussi
        google.script.run.SAT_openAssistant();
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('btnAppend').disabled  = false;
      document.getElementById('btnReplace').disabled = false;
      setStatus('❌ ' + (err.message || String(err)), 'err');
    })
    .SAT_importFromSave(parsedRows, append);
};

</script>
