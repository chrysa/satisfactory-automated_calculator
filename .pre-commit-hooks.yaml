# Pre-commit hooks provided by this repository.
#
# Usage in an external GAS project:
#   - repo: https://github.com/chrysa/satisfactory-automated_calculator
#     rev: <tag-or-sha>
#     hooks:
#       - id: check-gs-syntax
#       - id: check-scripts-syntax

- id: check-gs-syntax
  name: GAS syntax check (.gs)
  description: >
    Validates Google Apps Script files for JavaScript syntax errors.
    `node --check` parses any file as JS regardless of extension.
  entry: node --check
  language: system
  files: \.gs$

- id: check-scripts-syntax
  name: Node.js scripts syntax check
  description: Validates scripts/*.js for JavaScript syntax errors.
  entry: node --check
  language: system
  files: ^scripts/.*\.js$
  types: [javascript]
